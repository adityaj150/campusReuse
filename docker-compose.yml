version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campusreuse_db
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: campusdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campus_network

  redis:
    image: redis:7-alpine
    container_name: campusreuse_redis
    ports:
      - "6379:6379"
    networks:
      - campus_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusreuse_backend
    environment:
      # Spring Boot connects to the db service
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/campusdb
      - SPRING_DATASOURCE_USERNAME=campus
      - SPRING_DATASOURCE_PASSWORD=pass
      # Redis caching
      - REDIS_HOST=redis
      - CACHE_TYPE=redis
      # In production, change this to a strong secret!
      - JWT_SECRET=8C9D2A3F6B7E1D0C5A4F9B6E3D2C1A7B
      # Google Client ID
      - GOOGLE_CLIENT_ID=146501070525-agtk39bcu43red0gkoamn51k0m7784v3.apps.googleusercontent.com
      # NLP Service
      - NLP_SERVICE_URL=http://nlp-service:8000
      # AWS S3 Credentials
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # Email Notifications (Gmail SMTP)
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_APP_PASSWORD=${MAIL_APP_PASSWORD:-}
      - APP_BASE_URL=${APP_BASE_URL:-http://15.134.217.171}
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
      - nlp-service
    networks:
      - campus_network

  nlp-service:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    container_name: campusreuse_nlp
    environment:
      # Pass the backend URL so the NLP service can sync existing products on startup
      - NLP_BACKEND_SYNC_URL=http://backend:8080
    ports:
      - "8000:8000"
    networks:
      - campus_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = use relative URLs via Nginx reverse proxy (no CORS issues)
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    container_name: campusreuse_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - campus_network

volumes:
  postgres_data:

networks:
  campus_network:
