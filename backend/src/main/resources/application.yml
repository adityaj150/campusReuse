server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campusdb
    username: campus
    password: pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cache:
    type: ${CACHE_TYPE:none}
    redis:
      time-to-live: 600000   # 10 minutes in milliseconds

